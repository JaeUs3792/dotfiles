[global/wm]
margin-top = 0
margin-bottom = 0

include-file = modules.ini

[colors]
background = #282c34
foreground = #bbc2cf
color0     = #1c1f24
color1     = #ff6c6b
color2     = #98be65
color3     = #da8548
color4     = #51afef
color5     = #c678dd
color6     = #5699af
color7     = #abb2bf
color8     = #5b6268
color9     = #da8548
color10    = #4db5bd
color11    = #ecbe7b
color12    = #3071db
color13    = #a9a1e1
color14    = #46d9ff
color15    = #dfdfdf
alert      = #ff6c6b
trans      = #00282c34

####################################################################################################
## FHD (≤2559px)
####################################################################################################
[bar/marisol-fhd]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = true

bottom = false
fixed-center = true

width = 100%
height = 21

offset-x = 0
offset-y = 0

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0.0

line-size = 2
line-color = ${colors.color4}

border-size = 0
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "JetBrainsMono:style=Bold:size=7;2"
; FA icons
font-1 = "Font Awesome 7 Free Solid:size=9;2"
; Glyphs / Nerd Font
font-2 = "MesloLGS Nerd Font:style=Regular:size=13;3"
; Korean fallback
font-3 = "Noto Sans CJK KR:style=Regular:size=7;2"

modules-left   = launcher bspwm sep xwindow
modules-center = date
modules-right  = battery sep cpu2 memory2 filesystem networkspeed pulseaudio updates sep power

separator =

wm-restack = bspwm
enable-ipc = true

cursor-click  = pointer
cursor-scroll =

