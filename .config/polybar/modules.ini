######################################################
[module/launcher]
type     = custom/script
exec     = source /etc/os-release; case "$ID" in arch|cachyos|manjaro|endeavouros|garuda) echo "󰣇";; ubuntu) echo "󰕈";; debian) echo "󰣚";; fedora) echo "󰣛";; opensuse*) echo "󰣨";; *) echo "󰻀";; esac
interval = 86400

label      = " %output% "
label-font = 3
label-foreground = ${colors.color4}
label-background = ${colors.background}

click-left = rofi -show drun

######################################################
[module/sep]
type = custom/text
content = " "
content-foreground = ${colors.color15}
content-background = ${colors.background}

######################################################
[module/bspwm]
type = internal/bspwm

enable-click    = true
enable-scroll   = true
reverse-scroll  = true
pin-workspaces  = true
occupied-scroll = false

ws-icon-0 = 1;1
ws-icon-1 = 2;2
ws-icon-2 = 3;3
ws-icon-3 = 4;4
ws-icon-4 = 5;5
ws-icon-5 = 6;6
ws-icon-6 = 7;7
ws-icon-7 = 8;8
ws-icon-8 = 9;9
ws-icon-9 = 0;0

format = <label-state>
format-foreground = ${colors.foreground}
format-background = ${colors.background}

label-focused            = %icon%
label-focused-foreground = ${colors.foreground}
label-focused-background = ${colors.background}
label-focused-underline  = ${colors.color5}
label-focused-padding    = 1
label-focused-margin     = 0

label-occupied            = %icon%
label-occupied-foreground = ${colors.foreground}
label-occupied-background = ${colors.background}
label-occupied-underline  = ${colors.color2}
label-occupied-padding    = 1
label-occupied-margin     = 0

label-urgent            = %icon%
label-urgent-foreground = ${colors.foreground}
label-urgent-background = ${colors.alert}
label-urgent-underline  = ${colors.alert}
label-urgent-padding    = 1
label-urgent-margin     = 0

label-empty            = %icon%
label-empty-foreground = ${colors.color8}
label-empty-background = ${colors.background}
label-empty-padding    = 1
label-empty-margin     = 0

######################################################
[module/xwindow]
type = internal/xwindow

label        = %title%
label-maxlen = 50
label-empty  = Desktop

format-prefix = "󱂬 "
format-prefix-font      = 3
format-prefix-foreground = ${colors.color10}
format-foreground        = ${colors.color10}
format-background        = ${colors.background}
format-margin            = 2


######################################################
[module/cpu2]
type     = internal/cpu
interval = 1

format            = <label>
format-prefix = " "
format-prefix-font = 2
format-prefix-foreground = ${colors.color4}
format-foreground  = ${colors.color4}
format-background  = ${colors.background}
format-underline   = ${colors.color4}
format-margin      = 2

label = "%percentage:2%%"

######################################################
[module/memory2]
type     = internal/memory
interval = 1

format            = <label>
format-prefix     = " "
format-prefix-font = 2
format-prefix-foreground = ${colors.color11}
format-foreground  = ${colors.color11}
format-background  = ${colors.background}
format-underline   = ${colors.color11}
format-margin      = 2

label = "%percentage_used%%"

######################################################
[module/filesystem]
type          = internal/fs
mount-0       = /
interval      = 30
fixed-values  = false
spacing       = 4

format-mounted            = <label-mounted>
format-mounted-prefix     = " "
format-mounted-prefix-font = 2
format-mounted-prefix-foreground = ${colors.color3}
format-mounted-foreground  = ${colors.color3}
format-mounted-background  = ${colors.background}
format-mounted-underline   = ${colors.color3}
format-mounted-margin      = 2

label-mounted = "%free%"

format-unmounted-foreground = ${colors.foreground}

######################################################
[module/networkspeed]
type             = internal/network
interface-type   = wired
interval         = 2
accumulate-stats = true
unknown-as-up    = true
speed-unit       = ""

format-connected            = <label-connected>
format-connected-prefix     = " "
format-connected-prefix-font = 2
format-connected-prefix-foreground = ${colors.color2}
format-connected-foreground  = ${colors.color2}
format-connected-background  = ${colors.background}
format-connected-underline   = ${colors.color2}
format-connected-margin      = 2

label-connected = "%netspeed%6%"

format-disconnected-foreground = ${colors.alert}
label-disconnected             = "Offline"

######################################################
[module/pulseaudio]
type        = internal/pulseaudio
use-ui-max  = true
interval    = 5

format-volume            = <label-volume>
format-volume-prefix = " "
format-volume-prefix-font = 2
format-volume-prefix-foreground = ${colors.color5}
format-volume-foreground  = ${colors.color5}
format-volume-background  = ${colors.background}
format-volume-underline   = ${colors.color5}
format-volume-margin      = 2

label-volume = "%percentage%%"

format-muted            = <label-muted>
format-muted-prefix     = " "
format-muted-prefix-font = 2
format-muted-prefix-foreground = ${colors.color1}
format-muted-foreground  = ${colors.color1}
format-muted-background  = ${colors.background}
label-muted              = "Muted"

click-right = pavucontrol &

######################################################
[module/updates]
type     = custom/script
exec     = checkupdates 2>/dev/null | wc -l
interval = 1800

format            = <label>
format-prefix = " "
format-prefix-font = 2
format-prefix-foreground = ${colors.color2}
format-foreground  = ${colors.color2}
format-background  = ${colors.background}
format-underline   = ${colors.color2}
format-margin      = 2

label = "%output%"

click-left = ghostty -e paru &

######################################################
[module/date]
type     = internal/date
interval = 5

time     = %I:%M %P
date     = %a %d %b
date-alt = %A, %d %B %Y

format            = <label>
format-prefix     = " "
format-prefix-font = 2
format-prefix-foreground = ${colors.foreground}
format-foreground  = ${colors.foreground}
format-background  = ${colors.background}
format-margin      = 2

label = "%date%  %time%"

######################################################
[module/power]
type  = custom/text
label = ""
label-foreground = ${colors.color1}
label-background = ${colors.background}

click-left = ~/scripts/PowerMenu
